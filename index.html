<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alarm</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
    }

    /* Current time display */
    #clock {
      font-size: clamp(48px, 12vw, 96px);
      font-weight: 200;
      letter-spacing: 0.05em;
      font-variant-numeric: tabular-nums;
    }

    /* Card */
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      padding: 32px 40px;
      width: min(420px, 90vw);
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .card-title {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #666;
    }

    /* Time input */
    .time-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    input[type="time"] {
      flex: 1;
      background: #111;
      border: 1px solid #333;
      border-radius: 10px;
      color: #f0f0f0;
      font-size: 32px;
      font-weight: 300;
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.2s;
      font-variant-numeric: tabular-nums;
    }

    input[type="time"]:focus {
      border-color: #555;
    }

    /* Label input */
    input[type="text"] {
      width: 100%;
      background: #111;
      border: 1px solid #333;
      border-radius: 10px;
      color: #f0f0f0;
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus { border-color: #555; }
    input[type="text"]::placeholder { color: #444; }

    /* Set button */
    #setBtn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 15px;
      font-weight: 500;
      transition: background 0.2s, transform 0.1s;
    }

    #setBtn.idle {
      background: #f0f0f0;
      color: #0f0f0f;
    }

    #setBtn.active {
      background: #ff3b30;
      color: #fff;
    }

    #setBtn:active { transform: scale(0.98); }

    /* Alarm list */
    #alarmList {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: min(420px, 90vw);
    }

    .alarm-item {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      animation: slideIn 0.2s ease;
    }

    .alarm-item.ringing {
      border-color: #ff3b30;
      animation: pulse 0.6s ease infinite alternate;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      from { background: #1a1a1a; }
      to   { background: #2a1212; }
    }

    .alarm-time {
      font-size: 24px;
      font-weight: 300;
      font-variant-numeric: tabular-nums;
    }

    .alarm-label {
      font-size: 12px;
      color: #666;
      margin-top: 2px;
    }

    .alarm-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* Toggle switch */
    .toggle {
      position: relative;
      width: 44px;
      height: 26px;
    }

    .toggle input { opacity: 0; width: 0; height: 0; }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #333;
      border-radius: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle-slider::before {
      content: "";
      position: absolute;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #fff;
      top: 3px;
      left: 3px;
      transition: transform 0.2s;
    }

    .toggle input:checked + .toggle-slider { background: #30d158; }
    .toggle input:checked + .toggle-slider::before { transform: translateX(18px); }

    .delete-btn {
      background: none;
      border: none;
      color: #444;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      padding: 2px 4px;
      transition: color 0.15s;
    }

    .delete-btn:hover { color: #ff3b30; }

    /* Dismiss overlay */
    #dismissOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 100;
    }

    #dismissOverlay.show { display: flex; }

    #dismissOverlay .ring-label {
      font-size: 18px;
      color: #ccc;
    }

    #dismissOverlay .ring-time {
      font-size: 72px;
      font-weight: 200;
      font-variant-numeric: tabular-nums;
      color: #ff3b30;
    }

    #dismissBtn {
      margin-top: 12px;
      padding: 16px 48px;
      border-radius: 50px;
      border: none;
      background: #f0f0f0;
      color: #0f0f0f;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s;
    }

    #dismissBtn:active { transform: scale(0.97); }

    .empty-hint {
      text-align: center;
      color: #444;
      font-size: 13px;
      padding: 8px 0;
    }
  </style>
</head>
<body>

<div id="clock">00:00:00</div>

<div class="card">
  <div class="card-title">New Alarm</div>
  <div class="time-row">
    <input type="time" id="timeInput" />
  </div>
  <input type="text" id="labelInput" placeholder="Label (optional)" maxlength="40" />
  <button id="setBtn" class="idle">Set Alarm</button>
</div>

<div id="alarmList"></div>

<div id="dismissOverlay">
  <div class="ring-label" id="ringLabel">Alarm</div>
  <div class="ring-time" id="ringTime">00:00</div>
  <button id="dismissBtn">Dismiss</button>
</div>

<script>
  // ── State ──────────────────────────────────────────────
  let alarms = JSON.parse(localStorage.getItem("alarms") || "[]");
  let audioCtx = null;
  let ringingNodes = [];
  let ringingId = null;

  // ── Clock ──────────────────────────────────────────────
  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2, "0");
    const m = String(now.getMinutes()).padStart(2, "0");
    const s = String(now.getSeconds()).padStart(2, "0");
    document.getElementById("clock").textContent = `${h}:${m}:${s}`;
    checkAlarms(h, m, s);
  }

  setInterval(updateClock, 1000);
  updateClock();

  // ── Alarm check ────────────────────────────────────────
  function checkAlarms(h, m, s) {
    if (s !== "00") return;
    const hhmm = `${h}:${m}`;
    alarms.forEach(a => {
      if (a.enabled && a.time === hhmm && ringingId === null) {
        triggerAlarm(a);
      }
    });
  }

  // ── Audio ──────────────────────────────────────────────
  function startRingTone() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const freqs = [880, 1100, 880, 1100];
    let t = audioCtx.currentTime;
    freqs.forEach(f => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = "sine";
      osc.frequency.value = f;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.3, t + 0.05);
      gain.gain.linearRampToValueAtTime(0, t + 0.4);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(t);
      osc.stop(t + 0.5);
      ringingNodes.push(osc);
      t += 0.55;
    });
    // loop
    ringingNodes._loopTimer = setInterval(() => {
      if (ringingId === null) { stopRingTone(); return; }
      const ctx = audioCtx;
      const freqs2 = [880, 1100, 880, 1100];
      let t2 = ctx.currentTime;
      freqs2.forEach(f => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "sine";
        osc.frequency.value = f;
        gain.gain.setValueAtTime(0, t2);
        gain.gain.linearRampToValueAtTime(0.3, t2 + 0.05);
        gain.gain.linearRampToValueAtTime(0, t2 + 0.4);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(t2);
        osc.stop(t2 + 0.5);
        t2 += 0.55;
      });
    }, 2400);
  }

  function stopRingTone() {
    if (ringingNodes._loopTimer) clearInterval(ringingNodes._loopTimer);
    ringingNodes = [];
    if (audioCtx) { audioCtx.close(); audioCtx = null; }
  }

  // ── Trigger ────────────────────────────────────────────
  function triggerAlarm(alarm) {
    ringingId = alarm.id;
    document.getElementById("ringTime").textContent = alarm.time;
    document.getElementById("ringLabel").textContent = alarm.label || "Alarm";
    document.getElementById("dismissOverlay").classList.add("show");
    renderList(); // highlight ringing item
    startRingTone();
  }

  document.getElementById("dismissBtn").addEventListener("click", () => {
    ringingId = null;
    stopRingTone();
    document.getElementById("dismissOverlay").classList.remove("show");
    renderList();
  });

  // ── Persistence ────────────────────────────────────────
  function save() {
    localStorage.setItem("alarms", JSON.stringify(alarms));
  }

  // ── Render ─────────────────────────────────────────────
  function renderList() {
    const container = document.getElementById("alarmList");
    container.innerHTML = "";

    if (alarms.length === 0) {
      const hint = document.createElement("p");
      hint.className = "empty-hint";
      hint.textContent = "No alarms set";
      container.appendChild(hint);
      return;
    }

    alarms.forEach(alarm => {
      const item = document.createElement("div");
      item.className = "alarm-item" + (alarm.id === ringingId ? " ringing" : "");

      item.innerHTML = `
        <div>
          <div class="alarm-time">${alarm.time}</div>
          ${alarm.label ? `<div class="alarm-label">${escHtml(alarm.label)}</div>` : ""}
        </div>
        <div class="alarm-right">
          <label class="toggle">
            <input type="checkbox" ${alarm.enabled ? "checked" : ""} data-id="${alarm.id}" />
            <span class="toggle-slider"></span>
          </label>
          <button class="delete-btn" data-id="${alarm.id}" title="Delete">×</button>
        </div>
      `;

      item.querySelector(".toggle input").addEventListener("change", e => {
        const id = e.target.dataset.id;
        const a = alarms.find(x => x.id === id);
        if (a) { a.enabled = e.target.checked; save(); }
      });

      item.querySelector(".delete-btn").addEventListener("click", e => {
        const id = e.target.dataset.id;
        alarms = alarms.filter(x => x.id !== id);
        if (ringingId === id) {
          ringingId = null;
          stopRingTone();
          document.getElementById("dismissOverlay").classList.remove("show");
        }
        save();
        renderList();
      });

      container.appendChild(item);
    });
  }

  function escHtml(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  // ── Set alarm ──────────────────────────────────────────
  const timeInput = document.getElementById("timeInput");
  const labelInput = document.getElementById("labelInput");
  const setBtn = document.getElementById("setBtn");

  // Default: next round hour
  (function setDefaultTime() {
    const now = new Date();
    now.setMinutes(0, 0, 0);
    now.setHours(now.getHours() + 1);
    const h = String(now.getHours()).padStart(2, "0");
    const m = "00";
    timeInput.value = `${h}:${m}`;
  })();

  setBtn.addEventListener("click", () => {
    const time = timeInput.value;
    if (!time) return;

    const id = Date.now().toString(36);
    alarms.push({ id, time, label: labelInput.value.trim(), enabled: true });
    alarms.sort((a, b) => a.time.localeCompare(b.time));
    labelInput.value = "";
    save();
    renderList();

    // Flash button feedback
    setBtn.textContent = "Added ✓";
    setBtn.classList.add("active");
    setTimeout(() => {
      setBtn.textContent = "Set Alarm";
      setBtn.classList.remove("active");
    }, 1200);
  });

  // Enter key sets alarm
  [timeInput, labelInput].forEach(el => {
    el.addEventListener("keydown", e => {
      if (e.key === "Enter") setBtn.click();
    });
  });

  // ── Init ───────────────────────────────────────────────
  renderList();
</script>
</body>
</html>
